name: Build README

on:
  push:
    branches:
      - main
    paths:
      - 'data/projects/**'
      - 'README.template.md'
      - 'build.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build script
        run: node build.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/projects/**/logo_with_corners.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update README.md and project SVGs" && git push)

